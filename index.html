<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">সততা প্রি ক্যাডেট স্কুল - রেজাল্ট পোর্টাল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Tiro+Bangla&display=swap" rel="stylesheet">
    
    <script src="./template.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif !important; margin: 0; padding: 0; box-sizing: border-box; }
        .main-container { display: flex !important; flex-direction: column !important; justify-content: center !important; align-items: center !important; min-height: 70vh !important; width: 100% !important; }
        
        @keyframes marquee { 
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-100%); } 
        }
        .animate-marquee { animation: marquee 35s linear infinite; }
        .animate-marquee:hover { animation-play-state: paused; }
        
        /* 🖨️ আল্ট্রা-কম্প্যাক্ট প্রিন্ট সেটিংস (A4/Letter ১ পেজের জন্য) */
        @media print {
            html, body { background-image: none !important; background-color: #ffffff !important; color: #000000 !important; margin: 0 !important; padding: 0 !important; }
            header, .bg-yellow-400, #searchFormCard, footer, .print-btn, i { display: none !important; }
            .main-container, main { padding: 0 !important; margin: 0 !important; min-height: auto !important; display: block !important; }
            
            #resultBox { 
                display: block !important; 
                margin: 20px auto !important; 
                padding: 30px !important; 
                border: 4px double #0f766e !important; 
                border-radius: 8px !important; 
                box-shadow: none !important; 
                width: 100% !important; 
                max-width: 750px !important; 
                background: #ffffff !important; 
                page-break-inside: avoid; 
            }
            table { width: 100% !important; border-collapse: collapse !important; margin-top: 15px !important; }
            th { background-color: #f8fafc !important; color: #000000 !important; border: 1px solid #cbd5e1 !important; padding: 8px !important; font-size: 12px !important; }
            td { border: 1px solid #cbd5e1 !important; padding: 8px !important; color: #000000 !important; font-size: 12px !important; }
            .stamp-box { right: 20px !important; top: 110px !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-slate-800 bg-cover bg-center bg-no-repeat bg-fixed relative" style="background-image: linear-gradient(rgba(238, 242, 255, 0.88), rgba(238, 242, 255, 0.88)), url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1200');">
    
    <header class="bg-gradient-to-r from-emerald-600 via-teal-600 to-cyan-600 text-white shadow-lg text-center py-8 relative overflow-hidden">
        <div class="max-w-4xl mx-auto px-4">
            <i class="fa-solid fa-graduation-cap text-4xl mb-2 text-yellow-300"></i>
            <h1 id="headerSchoolName" class="text-3xl md:text-4xl font-black tracking-tight">লোড হচ্ছে...</h1>
            <p id="headerSubtitle" class="text-teal-100 text-xs md:text-sm mt-1 font-medium tracking-widest uppercase"></p>
        </div>
    </header>
    
    <div class="bg-yellow-400 text-slate-900 font-bold text-xs md:text-sm py-2 overflow-hidden relative w-full flex items-center shadow-inner z-20">
        <div class="bg-rose-600 text-white px-3 py-1 text-xs uppercase tracking-wider rounded-r-md z-30 font-black absolute left-0 shadow flex items-center gap-1"><i class="fa-solid fa-bullhorn"></i> নোটিশ:</div>
        <div id="marqueeNotice" class="whitespace-nowrap animate-marquee pl-[10%] inline-block">🎉 সততা প্রি ক্যাডেট স্কুলের বার্ষিক পরীক্ষার ফলাফল প্রকাশিত হয়েছে! নিচে ক্লাস ও রোল সিলেক্ট করে ফলাফল দেখুন।</div>
    </div>
    
    <main class="main-container px-4 py-8 z-10 w-full">
        <div id="searchFormCard" class="bg-white/95 backdrop-blur-sm p-6 md:p-8 rounded-2xl shadow-2xl border border-teal-100 w-full max-w-md">
            <h2 class="text-xl font-bold text-teal-900 text-center mb-6 flex items-center justify-center gap-2"><i class="fa-solid fa-star text-yellow-400 animate-pulse"></i> ফলাফল অনুসন্ধান করুন</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">শ্রেণী নির্বাচন করুন</label>
                    <select id="classSelect" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm font-bold focus:border-teal-500 outline-none transition">
                        <option value="Play">Play Group</option>
                        <option value="Nursery">Nursery</option>
                        <option value="Class_1">Class 1</option>
                        <option value="Class_2">Class 2</option>
                        <option value="Class_3">Class 3</option>
                        <option value="Class_4">Class 4</option>
                        <option value="Class_5">Class 5</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">রোল নম্বর</label>
                    <input type="number" id="rollInput" placeholder="রোল নম্বর লিখুন" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold focus:border-teal-500 outline-none transition">
                </div>
                <button onclick="checkResult()" class="w-full bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-700 hover:to-emerald-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-md flex items-center justify-center gap-2"><i class="fa-solid fa-magnifying-glass"></i> ফলাফল দেখুন</button>
            </div>
            <div id="loading" class="hidden text-center mt-8"><div class="animate-bounce inline-block text-3xl text-teal-600 mb-2">🎈</div><p class="text-slate-500 text-xs font-bold tracking-wide">রিপোর্ট কার্ড খোঁজা হচ্ছে...</p></div>
        </div>
        
        <div id="resultBox" class="hidden mt-6 w-full max-w-2xl transition-all duration-300"></div>
    </main>
    
    <footer class="bg-slate-800 text-slate-400 text-center py-4 text-xs font-medium border-t border-slate-700 z-10 w-full"><p id="footerCopyright">© 2026 সততা প্রি ক্যাডেট স্কুল</p></footer>
    
    <script>
    let schoolConfig = { school_name: "সততা প্রি ক্যাডেট স্কুল", established: "২০০৮ খ্রি.", report_card_title: "বার্ষিক পরীক্ষার অগ্রগতি প্রতিবেদন", portal_subtitle: "বার্ষিক পরীক্ষা - ফলাফল প্রকাশনা পোর্টাল", copyright_text: "© 2026 সততা প্রি ক্যাডেট স্কুল" };
    
    async function loadGlobalData() {
        const instantTimestamp = Date.now(); 
        try {
            const noticeResponse = await fetch(`./notice.json?nocache=${instantTimestamp}`);
            if (noticeResponse.ok) { 
                const noticeData = await noticeResponse.json(); 
                const marqueeElement = document.getElementById("marqueeNotice");
                marqueeElement.innerText = noticeData.notice_text; 
                if (noticeData.duration) { marqueeElement.style.animationDuration = noticeData.duration; }
            }
        } catch (e) { console.log("Notice failed."); }

        try {
            const configResponse = await fetch(`./config.json?nocache=${instantTimestamp}`);
            if (configResponse.ok) {
                schoolConfig = await configResponse.json();
                document.title = `${schoolConfig.school_name} - রেজাল্ট পোর্টাল`;
                document.getElementById("headerSchoolName").innerText = schoolConfig.school_name;
                document.getElementById("headerSubtitle").innerText = schoolConfig.portal_subtitle;
                document.getElementById("footerCopyright").innerText = schoolConfig.copyright_text;
            }
        } catch (e) { }
    }

    window.onload = loadGlobalData;

    async function checkResult() {
        const selectedClass = document.getElementById("classSelect").value;
        const roll = document.getElementById("rollInput").value.trim();
        const resultBox = document.getElementById("resultBox");
        const loading = document.getElementById("loading");
        if (!roll) { alert("দয়া করে একটি রোল নম্বর লিখুন!"); return; }
        resultBox.classList.add("hidden"); loading.classList.remove("hidden");
        
        try {
            const response = await fetch(`./${selectedClass}.json?nocache=${Date.now()}`);
            if (!response.ok) { throw new Error("error"); }
            const data = await response.json();
            
            setTimeout(() => {
                loading.classList.add("hidden");
                if (data[roll]) {
                    const student = data[roll];
                    let subjectRows = ""; 
                    let grandTotalObtained = 0; 
                    let grandMaxMarks = 0;
                    
                    const b2e = { '০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9' };
                    
                    for (const [subject, markString] of Object.entries(student.subjects)) {
                        const match = markString.match(/^[\d০-৯]+/); 
                        let obtainedMark = 0;
                        if (match) {
                            let engNum = match[0].split('').map(char => b2e[char] || char).join('');
                            obtainedMark = parseInt(engNum) || 0;
                        }
                        
                        let maxMark = 100; 
                        let percentage = Math.round((obtainedMark / maxMark) * 100);
                        let gradeMatch = markString.match(/\(([^)]+)\)/);
                        let grade = gradeMatch ? gradeMatch[1] : "N/A";
                        
                        grandTotalObtained += obtainedMark;
                        grandMaxMarks += maxMark;
                        
                        subjectRows += `
                            <tr class="border-b border-slate-200 text-center hover:bg-slate-50/50 transition text-sm">
                                <td class="py-2.5 px-4 text-left font-semibold text-slate-700">${subject}</td>
                                <td class="py-2.5 px-2 text-slate-600 font-medium">${maxMark}</td>
                                <td class="py-2.5 px-2 font-bold text-slate-900">${obtainedMark}</td>
                                <td class="py-2.5 px-2 text-slate-600">${percentage}%</td>
                                <td class="py-2.5 px-2 font-bold text-emerald-600">${grade}</td>
                                <td class="py-2.5 px-2 font-bold text-teal-600 text-xs">PASS</td>
                            </tr>
                        `;
                    }
                    
                    let totalPercentage = Math.round((grandTotalObtained / grandMaxMarks) * 100);
                    let finalGrade = "F";
                    if (totalPercentage >= 80) finalGrade = "A+";
                    else if (totalPercentage >= 70) finalGrade = "A";
                    else if (totalPercentage >= 60) finalGrade = "A-";
                    else if (totalPercentage >= 50) finalGrade = "B";
                    else if (totalPercentage >= 40) finalGrade = "C";
                    else if (totalPercentage >= 33) finalGrade = "D";

                    const e2b = { '0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯' };
                    const totalMarksBangla = grandTotalObtained.toString().split('').map(char => e2b[char] || char).join('');
                    const displayClassName = document.getElementById("classSelect").options[document.getElementById("classSelect").selectedIndex].text;
                    
                    // 🎯 আলাদা টেমপ্লেট ফাংশনকে ডাটা পাঠানো হলো
                    resultBox.innerHTML = generateResultCardHTML(student, roll, displayClassName, subjectRows, totalMarksBangla, grandMaxMarks, grandTotalObtained, totalPercentage, finalGrade, schoolConfig);
                } else {
                    resultBox.innerHTML = `<div class="bg-amber-50 border-2 border-amber-200 rounded-xl p-5 text-center max-w-md mx-auto"><h3 class="text-sm font-bold text-amber-800">ফলাফল পাওয়া যায়নি!</h3></div>`;
                }
                resultBox.classList.remove("hidden");
            }, 400);
        } catch (error) {
            loading.classList.add("hidden");
            resultBox.innerHTML = `<div class="bg-rose-50 border-2 border-rose-200 rounded-xl p-5 text-center max-w-md mx-auto"><h3 class="text-sm font-bold text-rose-800">ফাইল লোড করা যায়নি!</h3></div>`;
            resultBox.classList.remove("hidden");
        }
    }
    </script>
</body>
</html>
