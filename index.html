<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সততা প্রি ক্যাডেট স্কুল - রেজাল্ট পোর্টাল</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- Header Section -->
    <header class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white p-8 text-center shadow-lg">
        <h1 class="text-3xl font-black">সততা প্রি ক্যাডেট স্কুল</h1>
        <p class="text-teal-100 text-sm mt-2">বার্ষিক পরীক্ষা - ফলাফল প্রকাশনা পোর্টাল</p>
    </header>

    <!-- Main Search Area -->
    <main class="flex flex-col items-center p-4 mt-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-teal-100">
            <h2 class="text-xl font-bold text-teal-900 text-center mb-6">ফলাফল অনুসন্ধান করুন</h2>
            
            <select id="classSelect" class="w-full border-2 border-slate-200 p-3 rounded-xl mb-4 font-bold text-sm">
                <option value="Play">Play Group</option>
                <option value="Nursery">Nursery</option>
                <option value="Class_1">Class 1</option>
                <option value="Class_5">Class 5</option>
            </select>
            
            <input type="number" id="rollInput" placeholder="রোল নম্বর লিখুন" class="w-full border-2 border-slate-200 p-3 rounded-xl mb-4 font-bold text-sm">
            
            <button onclick="checkResult()" class="w-full bg-teal-600 text-white py-3 rounded-xl font-bold hover:bg-teal-700 transition">ফলাফল দেখুন</button>
            
            <button id="bulkPrintBtn" onclick="checkBulk()" class="hidden w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mt-2 hover:bg-indigo-700 transition">পুরো ক্লাস ডাউনলোড (Admin)</button>
        </div>
        
        <div id="resultBox" class="mt-8 w-full max-w-2xl"></div>
    </main>

    <!-- Footer -->
    <footer class="text-center p-6 text-xs text-slate-500 mt-10">
        <p onclick="secretTap()">© ২০২৬ সততা প্রি ক্যাডেট স্কুল</p>
    </footer>

    <script>
        let tap = 0;
        function secretTap() {
            tap++;
            if(tap === 3) {
                if(prompt("অ্যাডমিন পাসওয়ার্ড:") === "admin555") {
                    document.getElementById("bulkPrintBtn").classList.remove("hidden");
                    alert("অ্যাডমিন মোড সক্রিয় হয়েছে!");
                }
                tap = 0;
            }
            setTimeout(() => tap = 0, 3000);
        }

        async function checkResult() {
            alert("আপনি রোল ও ক্লাস সিলেক্ট করে বাটনে ক্লিক করেছেন। আপনার JSON ফাইলগুলো ঠিকমতো আছে কিনা চেক করুন।");
        }
    </script>
</body>
</html>
