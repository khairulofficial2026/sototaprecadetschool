<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">সততা প্রি ক্যাডেট স্কুল - রেজাল্ট পোর্টাল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Tiro+Bangla&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif !important; margin: 0; padding: 0; box-sizing: border-box; }
        .main-container { display: flex !important; flex-direction: column !important; justify-content: center !important; align-items: center !important; min-height: 70vh !important; width: 100% !important; }
        @keyframes marquee { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        .animate-marquee { animation: marquee 35s linear infinite; }
        .animate-marquee:hover { animation-play-state: paused; }
        @media print {
            html, body { background-image: none !important; background-color: #ffffff !important; color: #000000 !important; margin: 0 !important; padding: 0 !important; }
            header, .bg-yellow-400, #searchFormCard, footer, .print-btn, i { display: none !important; }
            .main-container, main { padding: 0 !important; margin: 0 !important; min-height: auto !important; display: block !important; }
            #resultBox { display: block !important; margin: 40px auto !important; padding: 40px !important; border: 6px double #0f766e !important; border-radius: 8px !important; box-shadow: none !important; width: 100% !important; max-width: 800px !important; background: #ffffff !important; page-break-inside: avoid; }
            table { width: 100% !important; border-collapse: collapse !important; margin-top: 20px !important; }
            th { background-color: #f1f5f9 !important; color: #000000 !important; border: 1px solid #cbd5e1 !important; }
            td { border: 1px solid #cbd5e1 !important; padding: 10px 12px !important; color: #000000 !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-slate-800 bg-cover bg-center bg-no-repeat bg-fixed relative" style="background-image: linear-gradient(rgba(238, 242, 255, 0.88), rgba(238, 242, 255, 0.88)), url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1200');">
    <header class="bg-gradient-to-r from-emerald-600 via-teal-600 to-cyan-600 text-white shadow-lg text-center py-8 relative overflow-hidden">
        <div class="max-w-4xl mx-auto px-4">
            <i class="fa-solid fa-graduation-cap text-4xl mb-2 text-yellow-300"></i>
            <h1 id="headerSchoolName" class="text-3xl md:text-4xl font-black tracking-tight">লোড হচ্ছে...</h1>
            <p id="headerSubtitle" class="text-teal-100 text-xs md:text-sm mt-1 font-medium tracking-widest uppercase"></p>
        </div>
    </header>
    <div class="bg-yellow-400 text-slate-900 font-bold text-xs md:text-sm py-2 overflow-hidden relative w-full flex items-center shadow-inner z-20">
        <div class="bg-rose-600 text-white px-3 py-1 text-xs uppercase tracking-wider rounded-r-md z-30 font-black absolute left-0 shadow flex items-center gap-1"><i class="fa-solid fa-bullhorn"></i> নোটিশ:</div>
        <div id="marqueeNotice" class="whitespace-nowrap animate-marquee pl-[10%] inline-block">নোটিশ লোড হচ্ছে...</div>
    </div>
    <main class="main-container px-4 py-8 z-10 w-full">
        <div id="searchFormCard" class="bg-white/95 backdrop-blur-sm p-6 md:p-8 rounded-2xl shadow-2xl border border-teal-100 w-full max-w-md">
            <h2 class="text-xl font-bold text-teal-900 text-center mb-6 flex items-center justify-center gap-2"><i class="fa-solid fa-star text-yellow-400 animate-pulse"></i> ফলাফল অনুসন্ধান করুন</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">শ্রেণী নির্বাচন করুন</label>
                    <select id="classSelect" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm font-bold focus:border-teal-500 outline-none transition">
                        <option value="Play">Play Group</option>
                        <option value="Nursery">Nursery</option>
                        <option value="Class_1">Class 1</option>
                        <option value="Class_2">Class 2</option>
                        <option value="Class_3">Class 3</option>
                        <option value="Class_4">Class 4</option>
                        <option value="Class_5">Class 5</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">রোল নম্বর</label>
                    <input type="number" id="rollInput" placeholder="রোল নম্বর লিখুন" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold focus:border-teal-500 outline-none transition">
                </div>
                <button onclick="checkResult()" class="w-full bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-700 hover:to-emerald-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-md flex items-center justify-center gap-2"><i class="fa-solid fa-magnifying-glass"></i> ফলাফল দেখুন</button>
            </div>
            <div id="loading" class="hidden text-center mt-8"><div class="animate-bounce inline-block text-3xl text-teal-600 mb-2">🎈</div><p class="text-slate-500 text-xs font-bold tracking-wide">রিপোর্ট কার্ড খোঁজা হচ্ছে...</p></div>
        </div>
        <div id="resultBox" class="hidden mt-6 w-full max-w-2xl transition-all duration-300"></div>
    </main>
    <footer class="bg-slate-800 text-slate-400 text-center py-4 text-xs font-medium border-t border-slate-700 z-10 w-full"><p id="footerCopyright">© 2026 সততা প্রি ক্যাডেট স্কুল</p></footer>
    <script>
    let schoolConfig = { school_name: "সততা প্রি ক্যাডেট স্কুল", established: "২০০৮ খ্রি.", report_card_title: "বার্ষিক পরীক্ষার অগ্রগতি প্রতিবেদন", portal_subtitle: "বার্ষিক পরীক্ষা - ফলাফল প্রকাশনা পোর্টাল", copyright_text: "© 2026 সততা প্রি ক্যাডেট স্কুল" };
    async function loadGlobalData() {
        const timestamp = new Date().getTime();
        try {
            const noticeResponse = await fetch(`./notice.json?t=${timestamp}`);
            if (noticeResponse.ok) { const noticeData = await noticeResponse.json(); document.getElementById("marqueeNotice").innerText = noticeData.notice_text; }
        } catch (e) { console.log("Notice failed"); }
        try {
            const configResponse = await fetch(`./config.json?t=${timestamp}`);
            if (configResponse.ok) {
                schoolConfig = await configResponse.json();
                document.title = `${schoolConfig.school_name} - রেজাল্ট পোর্টাল`;
                document.getElementById("headerSchoolName").innerText = schoolConfig.school_name;
                document.getElementById("headerSubtitle").innerText = schoolConfig.portal_subtitle;
                document.getElementById("footerCopyright").innerText = schoolConfig.copyright_text;
            }
        } catch (e) {
            document.getElementById("headerSchoolName").innerText = schoolConfig.school_name;
            document.getElementById("headerSubtitle").innerText = schoolConfig.portal_subtitle;
        }
    }
    window.onload = loadGlobalData;
    async function checkResult() {
        const selectedClass = document.getElementById("classSelect").value;
        const roll = document.getElementById("rollInput").value.trim();
        const resultBox = document.getElementById("resultBox");
        const loading = document.getElementById("loading");
        if (!roll) { alert("দয়া করে একটি রোল নম্বর লিখুন!"); return; }
        resultBox.classList.add("hidden"); loading.classList.remove("hidden");
        try {
            const response = await fetch(`./${selectedClass}.json?t=${new Date().getTime()}`);
            if (!response.ok) { throw new Error("error"); }
            const data = await response.json();
            setTimeout(() => {
                loading.classList.add("hidden");
                if (data[roll]) {
                    const student = data[roll];
                    let subjectRows = ""; let totalMarks = 0;
                    const b2e = { '০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9' };
                    for (const [subject, mark] of Object.entries(student.subjects)) {
                        const match = mark.match(/^[\d০-৯]+/); let numericMark = 0;
                        if (match) {
                            let engNum = match[0].split('').map(char => b2e[char] || char).join('');
                            numericMark = parseInt(engNum) || 0;
                        }
                        totalMarks += numericMark;
                        subjectRows += `<tr class="border-b border-slate-200"><td class="py-3 px-4 text-slate-700 font-semibold text-sm">${subject}</td><td class="py-3 px-4 text-center font-bold text-slate-800 text-sm">${mark}</td></tr>`;
                    }
                    const e2b = { '0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯' };
                    const totalMarksBangla = totalMarks.toString().split('').map(char => e2b[char] || char).join('');
                    const displayClassName = document.getElementById("classSelect").options[document.getElementById("classSelect").selectedIndex].text;
                    resultBox.innerHTML = `
                        <div class="bg-white border-4 border-double border-teal-600 rounded-2xl p-6 md:p-8 relative overflow-hidden shadow-2xl">
                            <div class="absolute right-6 top-32 border-4 border-dashed border-emerald-500/30 text-emerald-600/30 font-black text-xl px-4 py-2 rounded-lg transform rotate-12 select-none">উত্তীর্ণ<br>${student.status || 'PASSED'}</div>
                            <div class="text-center border-b-2 border-teal-800/20 pb-4 mb-6">
                                <h2 class="text-2xl font-black text-teal-900" style="font-family: 'Tiro Bangla', serif;">${schoolConfig.school_name}</h2>
                                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">স্থাপিত: ${schoolConfig.established} | ${schoolConfig.report_card_title}</p>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border mb-6 grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
                                <div><span class="text-slate-400 font-medium">নাম:</span> <strong class="text-teal-950 font-bold">${student.name}</strong></div>
                                <div><span class="text-slate-400 font-medium">শ্রেণী:</span> <strong class="text-slate-800 font-bold">${displayClassName}</strong></div>
                                <div><span class="text-slate-400 font-medium">রোল:</span> <strong class="text-slate-800 font-bold">${roll}</strong></div>
                            </div>
                            <div class="overflow-hidden border rounded-xl shadow-sm">
                                <table class="w-full text-left border-collapse">
                                    <thead><tr class="bg-slate-100 text-slate-700 border-b"><th class="py-3 px-4 font-bold text-xs uppercase">বিষয়ের নাম</th><th class="py-3 px-4 font-bold text-xs uppercase text-center">প্রাপ্ত নম্বর ও গ্রেড</th></tr></thead>
                                    <tbody>
                                        ${subjectRows}
                                        <tr class="bg-teal-50/40 font-bold border-t border-teal-200"><td class="py-3 px-4 text-teal-900 text-sm">সর্বমোট প্রাপ্ত নম্বর:</td><td class="py-3 px-4 text-center text-teal-700 text-base font-black">${totalMarksBangla}</td></tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="mt-6 p-3.5 bg-amber-50/50 border rounded-xl"><p class="text-xs text-slate-600"><strong>শ্রেণী শিক্ষকের মন্তব্য:</strong> <span class="italic text-slate-700">"${student.remarks}"</span></p></div>
                            <div class="mt-14 hidden print:flex justify-between text-center px-4">
                                <div><div class="w-28 border-b border-slate-400 h-5"></div><p class="text-[10px] text-slate-500 font-bold mt-1">অভিভাবকের স্বাক্ষর</p></div>
                                <div><div class="w-28 border-b border-slate-400 h-5"></div><p class="text-[10px] text-slate-500 font-bold mt-1">শ্রেণী শিক্ষকের স্বাক্ষর</p></div>
                                <div><div class="w-28 border-b border-teal-700 h-5"></div><p class="text-[10px] text-teal-900 font-bold mt-1">প্রধান শিক্ষকের স্বাক্ষর</p></div>
                            </div>
                            <button onclick="window.print()" class="print-btn w-full mt-6 bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-bold py-3 rounded-xl text-sm shadow-lg flex items-center justify-center gap-2"><i class="fa-solid fa-print"></i> এই প্রিমিয়াম রিপোর্ট কার্ডটি প্রিন্ট করুন</button>
                        </div>
                    `;
                } else {
                    resultBox.innerHTML = `<div class="bg-amber-50 border-2 border-amber-200 rounded-xl p-5 text-center max-w-md mx-auto"><h3 class="text-sm font-bold text-amber-800">ফлаফল পাওয়া যায়নি!</h3></div>`;
                }
                resultBox.classList.remove("hidden");
            }, 400);
        } catch (error) {
            loading.classList.add("hidden");
            resultBox.innerHTML = `<div class="bg-rose-50 border-2 border-rose-200 rounded-xl p-5 text-center max-w-md mx-auto"><h3 class="text-sm font-bold text-rose-800">ফাইল লোড করা যায়নি!</h3><p class="text-xs text-slate-500 mt-1">গিটহাবে সব ফাইল ঠিকমতো আছে কিনা নিশ্চিত করুন।</p></div>`;
            resultBox.classList.remove("hidden");
        }
    }
    </script>
</body>
</html>
