<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">সততা প্রি ক্যাডেট স্কুল - রেজাল্ট পোর্টাল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Tiro+Bangla&display=swap" rel="stylesheet">
    
    <script src="./template.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif !important; }
        .animate-marquee { animation: marquee 35s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        /* প্রিন্ট সেটিংস: আগের মতোই শক্তিশালী */
        @media print {
            header, .bg-yellow-400, #searchFormCard, footer, .print-btn { display: none !important; }
            .result-card-item { page-break-after: always !important; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col justify-between">
    
    <header class="bg-gradient-to-r from-emerald-600 to-cyan-600 text-white p-8 text-center shadow-lg">
        <h1 id="headerSchoolName" class="text-3xl font-black">সততা প্রি ক্যাডেট স্কুল</h1>
        <p id="headerSubtitle" class="text-teal-100 text-sm mt-2">বার্ষিক পরীক্ষা - ফলাফল প্রকাশনা পোর্টাল</p>
    </header>
    
    <div class="bg-yellow-400 py-2 overflow-hidden font-bold text-sm">
        <div id="marqueeNotice" class="animate-marquee whitespace-nowrap">ফলাফল প্রকাশিত হয়েছে! নিচে ক্লাস ও রোল সিলেক্ট করে রেজাল্ট দেখুন।</div>
    </div>
    
    <main class="flex-grow p-4 flex flex-col items-center">
        <div id="searchFormCard" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-teal-100">
            <div id="adminBadge" class="hidden text-[10px] bg-indigo-600 text-white px-2 py-1 rounded-full uppercase mb-2 inline-block">Admin Mode</div>
            <select id="classSelect" class="w-full border-2 border-slate-200 p-3 rounded-xl mb-4 font-bold">
                <option value="Play">Play Group</option>
                <option value="Nursery">Nursery</option>
                <option value="Class_1">Class 1</option>
                <option value="Class_5">Class 5</option>
            </select>
            <input type="number" id="rollInput" placeholder="রোল নম্বর" class="w-full border-2 border-slate-200 p-3 rounded-xl mb-4 font-bold">
            <button onclick="checkResult()" class="w-full bg-teal-600 text-white py-3 rounded-xl font-bold hover:bg-teal-700">ফলাফল দেখুন</button>
            <button id="bulkPrintBtn" onclick="checkBulk()" class="hidden w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mt-2">পুরো ক্লাস ডাউনলোড</button>
        </div>
        <div id="resultBox" class="mt-6 w-full max-w-2xl"></div>
    </main>

    <footer class="text-center p-4 text-xs text-slate-500">
        <p onclick="secretTap()">© ২০২৬ সততা প্রি ক্যাডেট স্কুল</p>
    </footer>

    <script>
        // অ্যাডমিন মোড কন্ট্রোল (মোবাইল ও ল্যাপটপ উভয়ই)
        let tap = 0;
        function secretTap() {
            tap++;
            if(tap === 3) {
                if(prompt("অ্যাডমিন পাসওয়ার্ড দিন:") === "admin555") {
                    document.getElementById("bulkPrintBtn").classList.remove("hidden");
                    document.getElementById("adminBadge").classList.remove("hidden");
                }
                tap = 0;
            }
            setTimeout(() => tap = 0, 3000);
        }

        async function checkResult() {
            const cls = document.getElementById("classSelect").value;
            const roll = document.getElementById("rollInput").value;
            const res = await fetch(`./${cls}.json`);
            const data = await res.json();
            
            if(data[roll]) {
                const s = data[roll];
                // এখানে লজিক আগের মতোই, শুধু template.js ফাইলটি ঠিকমতো লিঙ্ক থাকতে হবে
                document.getElementById("resultBox").innerHTML = processStudentData(roll, s, cls);
            }
        }
    </script>
</body>
</html>
